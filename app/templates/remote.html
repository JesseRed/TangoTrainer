<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TangoTrainer Remote</title>
  <style>
    :root {
      --bg: #0f0f0f; --accent: #c8a96e; --text: #e5e5e5;
      --text-muted: #888; --border: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }
    header {
      padding: 0.875rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { color: var(--accent); font-weight: 700; font-size: 0.95rem; }
    .status { font-size: 0.75rem; color: var(--text-muted); }
    .status.connected { color: #34d399; }

    .content { flex: 1; display: flex; flex-direction: column; gap: 1rem; padding: 1rem; }

    .now-playing {
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.875rem 1rem; min-height: 52px;
    }
    .np-title { font-weight: 600; color: var(--accent); font-size: 0.95rem; }
    .np-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }

    .section-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted); margin-bottom: 0.4rem;
    }

    .btn-row { display: grid; gap: 0.6rem; }
    .btn-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .btn-row.cols-2 { grid-template-columns: 1fr 1fr; }

    .rbtn {
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 1.4rem; padding: 0.9rem 0.5rem;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 0.25rem; user-select: none;
      transition: background .1s, border-color .1s;
    }
    .rbtn:active { background: #252525; border-color: var(--accent); }
    .rbtn.primary { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 700; }
    .rbtn.primary:active { background: #e0c080; }
    .rbtn-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 400; letter-spacing: .02em; }
    .rbtn.primary .rbtn-label { color: #555; }

    .speed-row { display: flex; gap: 0.5rem; }
    .spd-btn {
      flex: 1; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.85rem; padding: 0.65rem 0.2rem; cursor: pointer;
      text-align: center; user-select: none; transition: border-color .1s, background .1s;
    }
    .spd-btn:active, .spd-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(200,169,110,.1);
    }

    .rating-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .rate-btn {
      padding: 0.75rem 0.5rem; border-radius: 8px; border: 1px solid; cursor: pointer;
      font-size: 0.8rem; font-weight: 600; text-align: center; user-select: none;
    }
    .rate-btn:active { opacity: 0.75; }
  </style>
</head>
<body>
<header>
  <span class="brand">TangoTrainer Remote</span>
  <span class="status" id="status">Verbinde…</span>
</header>

<div class="content">
  <div class="now-playing">
    <div class="np-title" id="np-title">—</div>
    <div class="np-meta" id="np-meta"></div>
  </div>

  <div>
    <div class="section-label">Steuerung</div>
    <div class="btn-row cols-3">
      <button class="rbtn" onclick="send('prev')">⏮<span class="rbtn-label">Zurück</span></button>
      <button class="rbtn primary" onclick="send('play_pause')">⏸<span class="rbtn-label">Play/Pause</span></button>
      <button class="rbtn" onclick="send('next')">⏭<span class="rbtn-label">Weiter</span></button>
    </div>
    <div class="btn-row cols-2" style="margin-top:0.6rem;">
      <button class="rbtn" onclick="send('replay')">↺<span class="rbtn-label">Nochmal</span></button>
      <button class="rbtn" onclick="send('fullscreen')">⛶<span class="rbtn-label">Vollbild</span></button>
    </div>
  </div>

  <div>
    <div class="section-label">Geschwindigkeit</div>
    <div class="speed-row">
      {% for label, val in [("50%","0.5"),("75%","0.75"),("90%","0.9"),("100%","1")] %}
      <button class="spd-btn{% if val == '1' %} active{% endif %}"
              data-val="{{ val }}" onclick="setSpeed('{{ val }}')">{{ label }}</button>
      {% endfor %}
    </div>
  </div>

  <div>
    <div class="section-label">Bewertung</div>
    <div class="rating-grid">
      <button class="rate-btn" onclick="rate('klappt gut')"
              style="background:rgba(52,211,153,.12);border-color:#34d399;color:#34d399;">
        ✓ Klappt gut
      </button>
      <button class="rate-btn" onclick="rate('noch unsicher')"
              style="background:rgba(251,191,36,.12);border-color:#fbbf24;color:#fbbf24;">
        ↻ Noch unsicher
      </button>
      <button class="rate-btn" onclick="rate('nicht verstanden')"
              style="background:rgba(248,113,113,.12);border-color:#f87171;color:#f87171;">
        ✗ Nicht verstanden
      </button>
      <button class="rate-btn" onclick="rate('überspringen')"
              style="background:rgba(107,114,128,.12);border-color:#6b7280;color:#6b7280;">
        → Überspringen
      </button>
    </div>
  </div>
</div>

<script>
const SESSION_ID = "{{ session_id }}";
let ws = null;
let delay = 1000;

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws/${SESSION_ID}`);
  ws.onopen = () => {
    document.getElementById("status").textContent = "Verbunden ●";
    document.getElementById("status").className = "status connected";
    delay = 1000;
  };
  ws.onclose = () => {
    document.getElementById("status").textContent = "Getrennt — verbinde…";
    document.getElementById("status").className = "status";
    setTimeout(connect, delay);
    delay = Math.min(delay * 2, 10000);
  };
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === "state") {
        document.getElementById("np-title").textContent = msg.title || "—";
        document.getElementById("np-meta").textContent = msg.meta || "";
      }
    } catch {}
  };
}

function send(cmd, extra) {
  if (ws && ws.readyState === 1)
    ws.send(JSON.stringify({cmd, ...extra}));
}

function setSpeed(val) {
  send("speed", {value: parseFloat(val)});
  document.querySelectorAll(".spd-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.val === val));
}

function rate(rating) { send("rate", {rating}); }

connect();
</script>
</body>
</html>
