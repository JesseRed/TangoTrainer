{% extends "base.html" %}
{% block title %}Neue Playlist — TangoTrainer{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Neue Playlist</h1>
  <a href="/playlists" class="btn btn-secondary btn-sm">← Playlists</a>
</div>

<div style="max-width:520px;">
  <div class="clip-panel">
    <form method="post" action="/playlists">
      <div class="form-group">
        <label>Titel</label>
        <input type="text" name="title" required placeholder="z. B. Milonga-Abend">
      </div>
      <div class="form-group">
        <label>Typ</label>
        <select name="playlist_type" required style="background:var(--bg-input); border:1px solid var(--border);
                color:var(--text); padding:0.5rem 0.75rem; border-radius:var(--radius); width:100%;">
          <option value="fixed">Feste Liste — bestimmte Stücke in fixer Reihenfolge</option>
          <option value="tanda">Tanda-Playlist — zufällige Tandas nach Muster mit Cortinas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Wiederholungen (nur bei Tanda-Playlist)</label>
        <input type="number" name="repeat_count" value="3" min="1" max="20">
      </div>
      <div class="form-group">
        <label>Notizen (optional)</label>
        <textarea name="notes" rows="2" placeholder="z. B. Für Milonga-Abend mit Gästen"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Playlist anlegen</button>
    </form>
  </div>
</div>
{% endblock %}
