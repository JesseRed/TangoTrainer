{% extends "base.html" %}
{% block title %}Neue Übungsstunde — TangoTrainer{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Neue Übungsstunde</h1>
  <a href="/lessons" class="btn btn-secondary btn-sm">← Zurück</a>
</div>

<div style="max-width:560px;">
  <form method="post" action="/lessons">
    <div class="form-group">
      <label for="title">Titel *</label>
      <input type="text" id="title" name="title" required placeholder="z. B. Tango Sonntag · 45 Minuten">
    </div>
    <div class="form-group">
      <label for="goal">Ziel</label>
      <input type="text" id="goal" name="goal" placeholder="z. B. Giro und Sacada verbessern">
    </div>
    <div class="form-group">
      <label for="planned_duration">Geplante Dauer (Minuten)</label>
      <input type="number" id="planned_duration" name="planned_duration" min="5" max="180" placeholder="45">
    </div>
    <div class="form-group">
      <label for="description">Beschreibung</label>
      <textarea id="description" name="description" placeholder="Optionale Notizen zur Stunde…"></textarea>
    </div>
    <input type="hidden" name="clip_ids" value="{{ clip_ids }}">
    <div style="display:flex; gap:0.75rem;">
      <button type="submit" class="btn btn-primary btn-lg">
        {% if clip_ids %}Erstellen & {{ clip_ids.split(',') | length }} Clip(s) hinzufügen{% else %}Erstellen{% endif %}
      </button>
      <a href="/lessons" class="btn btn-secondary btn-lg">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
